name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (lib, bins, tests)
        run: cargo build --all-targets
      - name: Test
        run: cargo test --all
